name: Build Repo Structure
on:
  push:
    branches:
      - rs-data
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create data file
        run: |
          if [ -f resources.json ]; then rm resources.json; fi
          tree -J > resources.json
      - name: Commit report
        run: |
          git config --global user.name 'ABSanthosh'
          git config --global user.email 'ABSanthosh@users.noreply.github.com'
          git add .
          git commit -am "Generate Resource structure"
          git push
